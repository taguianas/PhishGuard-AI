<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- Radial glow overlay (matches BrandGlyph gradient) -->
  <radialGradient id="glow" cx="50%" cy="0%" r="80%">
    <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
  </radialGradient>
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>
  <!-- Outer border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.25" fill="none" stroke="rgba(34,211,238,0.28)" stroke-width="1.5"/>
  <!-- Inner border (matches BrandGlyph inset border) -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Shield (exact paths from BrandMark.tsx, scaled to fit) -->
  <g transform="translate(4, 3) scale(0.75)">
    <path d="M16 3l9 4.8v6.7c0 7-4.1 11.9-9 14.7-4.9-2.8-9-7.7-9-14.7V7.8L16 3z"
          fill="none" stroke="#a5f3fc" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M12.2 16.1l2.4 2.6 5.2-5.6"
          fill="none" stroke="#a5f3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
