<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px; height: 28px;
      background: #4f46e5;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo svg { width: 16px; height: 16px; color: #fff; }

    header h1 { font-size: 15px; font-weight: 700; color: #0f172a; }

    main { padding: 16px; }

    #url-display {
      font-size: 11px;
      color: #64748b;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 8px 10px;
      word-break: break-all;
      font-family: monospace;
      margin-bottom: 12px;
      max-height: 48px;
      overflow: hidden;
    }

    #scan-btn {
      width: 100%;
      padding: 9px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #scan-btn:hover { background: #4338ca; }
    #scan-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    #result { margin-top: 14px; display: none; }

    .risk-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
    }

    .risk-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid;
    }

    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }

    .badge-high    { background:#fef2f2; color:#b91c1c; border-color:#fecaca; }
    .badge-medium  { background:#fffbeb; color:#92400e; border-color:#fde68a; }
    .badge-low     { background:#f0fdf4; color:#166534; border-color:#bbf7d0; }

    .score {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .score-label { font-size: 10px; color: #94a3b8; margin-top: 2px; }

    .reasons { margin-top: 10px; }

    .reason-item {
      display: flex;
      gap: 6px;
      font-size: 11px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 5px;
      padding: 5px 8px;
      margin-bottom: 4px;
    }

    .reason-item svg { flex-shrink: 0; margin-top: 1px; }

    #error {
      margin-top: 10px;
      font-size: 12px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 8px 10px;
      display: none;
    }

    footer {
      text-align: center;
      padding: 8px;
      font-size: 10px;
      color: #94a3b8;
      border-top: 1px solid #f1f5f9;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
      </svg>
    </div>
    <h1>PhishGuard</h1>
  </header>

  <main>
    <div id="url-display">Loading current tab…</div>
    <button id="scan-btn">Scan This URL</button>
    <div id="error"></div>

    <div id="result">
      <div class="risk-card">
        <div class="risk-row">
          <span id="badge" class="badge"></span>
          <div style="text-align:right">
            <div id="score" class="score"></div>
            <div class="score-label">Risk Score</div>
          </div>
        </div>
        <div id="reasons" class="reasons"></div>
      </div>
    </div>
  </main>

  <footer>Powered by PhishGuard AI</footer>

  <script src="popup.js"></script>
</body>
</html>
